[ids]
*

[main]
# disable keys
control = noop
meta = noop
shift = noop
esc = noop
alt = noop
backspace = noop

a = overload(meta, a)
s = overload(alt, s)
d = overload(shift, d)
f = overload(control, f)
j = overload(control, j)
k = overload(shift, k)
l = overload(alt, l)
; = overload(meta, ;)

capslock = layer(nav)
capslock = overload(nav, esc)

[nav]
h = left
j = down
k = up
l = right
space = backspace
' = enter

[sym]
space = enter

[meta:M]
[alt:A]
[shift:S]
[control:C]

[control+alt:C+A]

[meta+shift:M+S]

[meta+control:M+C]

[control+shift:C+S]

[meta+alt:M+A]

[alt+shift:A+S]

[control+alt+shift:C+A+S]

[meta+control+shift:M+C+S]

[meta+alt+shift:M+A+S]

[meta+control+alt:M+C+A]

